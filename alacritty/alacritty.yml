live_config_reload: true

import:
  # - ~/.config/alacritty/themes/catppuccin-frappe.yml
  - ~/.config/alacritty/themes/catppuccin-mocha.yml
  # - ~/.config/alacritty/themes/Tokyonight_Night.yml
  # - ~/.config/alacritty/themes/rose-pine.yml

font:
  size: 17
  normal:
    family: "JetBrainsMono Nerd Font"
    style: Regular
  bold:
    family: "JetBrainsMono Nerd Font"
    style: Bold
  italic:
    family: "JetBrainsMono Nerd Font"
    style: Italic


window:
  opacity: 0.99 
  option_as_alt: Both
  decorations: buttonless
  dimensions:
    columns: 150
    lines: 70 
  padding:
    x: 8
    y: 12 

env:
  TERM: xterm-256color
